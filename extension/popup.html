<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal OTP Vault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">extension</p>
        <h1>OTP Vault</h1>
        <p class="subtitle">Fast codes from your toolbar.</p>
      </div>
      <div class="global-timer">
        <span id="global-seconds">30s</span>
        <div class="timer-track"><div id="global-bar"></div></div>
      </div>
    </header>

    <section class="panel compose-panel">
      <div class="section-head">
        <h2>Add Entry</h2>
        <button id="toggle-form" class="ghost-btn" type="button">Hide</button>
      </div>

      <form id="entry-form" autocomplete="off">
        <input id="label" type="text" placeholder="GitHub:user@example.com">
        <input id="secret" type="text" placeholder="Base32 secret" required>
        <input id="tags" type="text" placeholder="Tags: work, infra">
        <div class="row two-up">
          <select id="digits">
            <option value="6">6 digits</option>
            <option value="8">8 digits</option>
          </select>
          <input id="period" type="number" min="15" max="120" value="30">
        </div>
        <div class="row two-up import-row">
          <label class="file-btn ghost-btn">
            <span>QR File</span>
            <input id="qr-file" type="file" accept="image/*">
          </label>
          <button id="paste-uri" class="ghost-btn" type="button">Paste URI</button>
        </div>
        <button type="submit" class="primary-btn">Add Entry</button>
      </form>
    </section>

    <section class="panel tools-panel">
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search issuer or account">
        <select id="sort-select" aria-label="Sort entries">
          <option value="alpha">A-Z</option>
          <option value="custom">Manual</option>
          <option value="recent">Newest</option>
          <option value="period">Fastest timer</option>
        </select>
        <button id="lock-btn" class="ghost-btn" type="button">Lock</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section id="unlock-panel" class="panel hidden">
      <div class="section-head">
        <h2>Extension Vault</h2>
      </div>
      <form id="unlock-form">
        <input id="unlock-passphrase" type="password" placeholder="Passphrase to unlock encrypted storage">
        <button id="unlock-btn" class="primary-btn" type="submit">Unlock</button>
        <p id="unlock-status" class="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="panel settings-panel">
      <div class="section-head">
        <h2>Security</h2>
      </div>
      <form id="security-form">
      <label class="toggle-row">
        <input id="encrypt-toggle" type="checkbox">
        <span>Encrypt entries in extension storage</span>
      </label>
      <div id="passphrase-fields" class="hidden">
        <input id="passphrase" type="password" placeholder="New passphrase">
        <input id="passphrase-confirm" type="password" placeholder="Confirm passphrase">
      </div>
      <button id="save-security" class="ghost-btn" type="submit">Save Security Settings</button>
      </form>
    </section>

    <section class="panel history-panel">
      <div class="section-head">
        <h2>Copy History</h2>
      </div>
      <div id="copy-history" class="history-list"></div>
    </section>

    <section id="entries" class="entries"></section>
  </main>

  <template id="entry-template">
    <article class="entry-card">
      <div class="entry-top">
        <div class="avatar"></div>
        <div class="identity">
          <h3 class="issuer"></h3>
          <p class="account"></p>
          <div class="tags"></div>
        </div>
        <button class="icon-btn remove" type="button" title="Remove">x</button>
      </div>

      <div class="entry-code-row">
        <p class="code"></p>
        <button class="ghost-btn edit" type="button">Edit</button>
        <button class="ghost-btn move-up" type="button">Up</button>
        <button class="ghost-btn move-down" type="button">Down</button>
        <button class="ghost-btn copy" type="button">Copy</button>
      </div>

      <div class="entry-bottom">
        <span class="meta"></span>
        <div class="mini-timer">
          <span class="seconds"></span>
          <div class="timer-track"><div class="bar"></div></div>
        </div>
      </div>
    </article>
  </template>

  <script type="module" src="popup.bundle.js"></script>

  <dialog id="edit-entry-dialog" class="panel hidden-dialog">
    <form id="edit-entry-form">
    <div class="section-head">
      <h2>Edit Entry</h2>
    </div>
    <input id="edit-entry-id" type="hidden">
    <input id="edit-label" type="text" placeholder="Label">
    <input id="edit-secret" type="text" placeholder="Base32 secret">
    <input id="edit-tags" type="text" placeholder="Tags">
    <div class="row two-up">
      <select id="edit-digits">
        <option value="6">6 digits</option>
        <option value="8">8 digits</option>
      </select>
      <input id="edit-period" type="number" min="15" max="120">
    </div>
    <p id="edit-status" class="status" aria-live="polite"></p>
    <div class="row two-up">
      <button id="cancel-edit" class="ghost-btn" type="button">Cancel</button>
      <button id="save-edit" class="primary-btn" type="submit">Save</button>
    </div>
    </form>
  </dialog>
</body>
</html>
